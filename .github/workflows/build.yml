name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pipx
        run: |
          python3 -m pip install --user pipx
          python3 -m pipx ensurepath
        shell: bash
      - name: Install jsonschema
        run: pipx install check-jsonschema
      - name: Validate Materials
        run: check-jsonschema --schemafile materials.schema.json materials.json
      - name: Validate Filaments
        run: check-jsonschema --schemafile filaments.schema.json filaments/*

  compile:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile filaments
        run: python3 scripts/compile_filaments.py
      - uses: actions/upload-artifact@v4
        with:
          name: filaments
          path: filaments.json
          if-no-files-found: error

  build-app:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: ./app
      - run: npm run build
        working-directory: ./app
      - uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    needs: [compile, build-app]
    concurrency:
      group: "pages"
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Download app
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: public
      - name: Download filaments
        uses: actions/download-artifact@v4
        with:
          name: filaments
          path: public
      - name: Copy materials
        run: cp materials.json public/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
